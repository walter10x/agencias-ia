# =============================================================================
# docker-compose.production.yml - Stack de producción para Dokploy
# =============================================================================
# Diferencias vs docker-compose.yml (local dev):
# - NO usa env_file (Dokploy inyecta env vars del proyecto)
# - Variables referenciadas como ${VAR} o ${VAR:-default}
# - Host ports NO expuestos (Traefik/Dokploy enruta por dominios)
# - Volúmenes nombrados para persistencia
# =============================================================================

services:
  # ============================================================
  # Frontend Dashboard - Panel de control (React + Vite + nginx)
  # ============================================================
  frontend:
    build:
      context: ./frontend-dashboard
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:8000}
    container_name: agencia-frontend
    restart: unless-stopped
    networks:
      - agencia-net
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.agencia-frontend.rule=Host(`${APP_DOMAIN:-agencias.localhost}`)"
      - "traefik.http.routers.agencia-frontend.entrypoints=websecure"
      - "traefik.http.routers.agencia-frontend.tls.certresolver=letsencrypt"
      - "traefik.http.services.agencia-frontend.loadbalancer.server.port=80"
    depends_on:
      - backend

  # ============================================================
  # Backend Core - Motor de IA (FastAPI + LangGraph)
  # ============================================================
  backend:
    build: ./backend-core
    container_name: agencia-backend
    restart: unless-stopped
    environment:
      # === Base de datos ===
      SUPABASE_URL: ${SUPABASE_URL:-http://postgrest-proxy:3000}
      SUPABASE_SERVICE_KEY: ${SUPABASE_SERVICE_KEY:-local-no-auth-needed}

      # === LLM Provider (agnostic) ===
      LLM_PROVIDER: ${LLM_PROVIDER:-openai}
      LLM_API_KEY: ${LLM_API_KEY:-}
      LLM_BASE_URL: ${LLM_BASE_URL:-}
      LLM_MODEL: ${LLM_MODEL:-gpt-4o-mini}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}

      # === WhatsApp Cloud API (Meta) ===
      WHATSAPP_PHONE_NUMBER_ID: ${WHATSAPP_PHONE_NUMBER_ID:-}
      WHATSAPP_ACCESS_TOKEN: ${WHATSAPP_ACCESS_TOKEN:-}
      WHATSAPP_VERIFY_TOKEN: ${WHATSAPP_VERIFY_TOKEN:-my-verify-token}
      WHATSAPP_API_VERSION: ${WHATSAPP_API_VERSION:-v22.0}

      # === n8n ===
      N8N_URL: ${N8N_URL:-http://n8n:5678}
      N8N_API_KEY: ${N8N_API_KEY:-}

      # === Redis / Celery ===
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1

      # === Seguridad ===
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
      JWT_EXPIRE_MINUTES: ${JWT_EXPIRE_MINUTES:-60}
      # Clave Fernet para cifrar el access_token de WhatsApp por tenant.
      # Generar con: python3 -c "from cryptography.fernet import Fernet; print(Fernet.generate_key().decode())"
      # Sin esta variable, el cifrado degrada a un fallback base64 INSEGURO
      # (ver app/infrastructure/security/credentials_cipher.py) — NUNCA
      # dejar vacío en producción real.
      CREDENTIALS_ENCRYPTION_KEY: ${CREDENTIALS_ENCRYPTION_KEY:-}

      # === App ===
      DEBUG: ${DEBUG:-false}
      CORS_ORIGINS: ${CORS_ORIGINS:-[]}
    networks:
      - agencia-net
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.agencia-backend.rule=Host(`${APP_DOMAIN:-agencias.localhost}`) && PathPrefix(`/api`, `/webhook`, `/health`, `/docs`, `/openapi.json`, `/redoc`)"
      - "traefik.http.routers.agencia-backend.entrypoints=websecure"
      - "traefik.http.routers.agencia-backend.tls.certresolver=letsencrypt"
      - "traefik.http.services.agencia-backend.loadbalancer.server.port=8000"
    depends_on:
      redis:
        condition: service_healthy
      postgrest-proxy:
        condition: service_started

  # ============================================================
  # PostgreSQL 16 + pgvector - Base de datos
  # ============================================================
  postgres:
    image: pgvector/pgvector:pg16
    container_name: agencia-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-agencias_db}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      # Password del rol "authenticator" que usa PostgREST. Se consume en
      # docker/postgres/00-create-roles.sh (NO hay password hardcodeada en
      # init.sql). Generar con: openssl rand -hex 24
      POSTGREST_AUTHENTICATOR_PASSWORD: ${POSTGREST_AUTHENTICATOR_PASSWORD:?POSTGREST_AUTHENTICATOR_PASSWORD is required}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./docker/postgres/00-create-roles.sh:/docker-entrypoint-initdb.d/00-create-roles.sh
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - agencia-net

  # ============================================================
  # PostgREST - API REST (compatible Supabase)
  # ============================================================
  # NOTA: el rol "authenticator" es creado por
  # docker/postgres/00-create-roles.sh usando la variable de entorno
  # POSTGREST_AUTHENTICATOR_PASSWORD (mismo valor que abajo). NO hay
  # password hardcodeada en el repo — ver esa nota también en el servicio
  # "postgres".
  postgrest:
    image: postgrest/postgrest:latest
    container_name: agencia-postgrest
    environment:
      PGRST_DB_URI: postgres://authenticator:${POSTGREST_AUTHENTICATOR_PASSWORD:?POSTGREST_AUTHENTICATOR_PASSWORD is required}@postgres:5432/${POSTGRES_DB:-agencias_db}
      PGRST_DB_SCHEMAS: public
      PGRST_DB_ANON_ROLE: web_anon
      PGRST_JWT_SECRET: ${JWT_SECRET}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - agencia-net

  # ============================================================
  # PostgREST Proxy (nginx) - Enruta /rest/v1/* al PostgREST
  # ============================================================
  postgrest-proxy:
    image: nginx:alpine
    container_name: agencia-postgrest-proxy
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - postgrest
    restart: unless-stopped
    networks:
      - agencia-net

  # ============================================================
  # Redis - Caché y broker para Celery
  # ============================================================
  redis:
    image: redis:7-alpine
    container_name: agencia-redis
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    networks:
      - agencia-net

  # ============================================================
  # n8n - Automatización de workflows
  # ============================================================
  n8n:
    image: n8nio/n8n:latest
    container_name: agencia-n8n
    environment:
      - N8N_BASIC_AUTH_ACTIVE=false
      - N8N_HOST=${N8N_HOST:-n8n.localhost}
      - N8N_PORT=5678
      - N8N_PROTOCOL=https
      - WEBHOOK_URL=${N8N_WEBHOOK_URL:-https://n8n.localhost/}
      - GENERIC_TIMEZONE=${GENERIC_TIMEZONE:-America/Bogota}
    volumes:
      - n8n-data:/home/node/.n8n
    restart: unless-stopped
    networks:
      - agencia-net
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.agencia-n8n.rule=Host(`${N8N_DOMAIN:-n8n.localhost}`)"
      - "traefik.http.routers.agencia-n8n.entrypoints=websecure"
      - "traefik.http.routers.agencia-n8n.tls.certresolver=letsencrypt"
      - "traefik.http.services.agencia-n8n.loadbalancer.server.port=5678"

  # ============================================================
  # Celery Worker - Tareas asíncronas (procesar mensajes, PDFs)
  # ============================================================
  celery-worker:
    build: ./backend-core
    container_name: agencia-celery
    command: celery -A app.infrastructure.config.celery_app worker --loglevel=info
    environment:
      SUPABASE_URL: ${SUPABASE_URL:-http://postgrest-proxy:3000}
      SUPABASE_SERVICE_KEY: ${SUPABASE_SERVICE_KEY:-local-no-auth-needed}
      LLM_PROVIDER: ${LLM_PROVIDER:-openai}
      LLM_API_KEY: ${LLM_API_KEY:-}
      LLM_BASE_URL: ${LLM_BASE_URL:-}
      LLM_MODEL: ${LLM_MODEL:-gpt-4o-mini}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      WHATSAPP_PHONE_NUMBER_ID: ${WHATSAPP_PHONE_NUMBER_ID:-}
      WHATSAPP_ACCESS_TOKEN: ${WHATSAPP_ACCESS_TOKEN:-}
      WHATSAPP_VERIFY_TOKEN: ${WHATSAPP_VERIFY_TOKEN:-my-verify-token}
      N8N_URL: ${N8N_URL:-http://n8n:5678}
      N8N_API_KEY: ${N8N_API_KEY:-}
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
      JWT_EXPIRE_MINUTES: ${JWT_EXPIRE_MINUTES:-60}
      # Ver comentario en el servicio "backend" — misma clave, mismo tenant.
      CREDENTIALS_ENCRYPTION_KEY: ${CREDENTIALS_ENCRYPTION_KEY:-}
      DEBUG: ${DEBUG:-false}
      CORS_ORIGINS: ${CORS_ORIGINS:-[]}
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - agencia-net

  # Scheduler de tareas periódicas (Fase 4): dispara send_appointment_reminders
  # según el beat_schedule de celery_app.py. DEBE correr como proceso ÚNICO
  # (exactamente un beat en todo el despliegue) además del worker; sin él,
  # los recordatorios de cita no se envían nunca.
  celery-beat:
    build: ./backend-core
    container_name: agencia-celery-beat
    command: celery -A app.infrastructure.config.celery_app beat --loglevel=info
    environment:
      SUPABASE_URL: ${SUPABASE_URL:-http://postgrest-proxy:3000}
      SUPABASE_SERVICE_KEY: ${SUPABASE_SERVICE_KEY:-local-no-auth-needed}
      LLM_PROVIDER: ${LLM_PROVIDER:-openai}
      LLM_API_KEY: ${LLM_API_KEY:-}
      LLM_BASE_URL: ${LLM_BASE_URL:-}
      LLM_MODEL: ${LLM_MODEL:-gpt-4o-mini}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      WHATSAPP_PHONE_NUMBER_ID: ${WHATSAPP_PHONE_NUMBER_ID:-}
      WHATSAPP_ACCESS_TOKEN: ${WHATSAPP_ACCESS_TOKEN:-}
      WHATSAPP_VERIFY_TOKEN: ${WHATSAPP_VERIFY_TOKEN:-my-verify-token}
      N8N_URL: ${N8N_URL:-http://n8n:5678}
      N8N_API_KEY: ${N8N_API_KEY:-}
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
      JWT_EXPIRE_MINUTES: ${JWT_EXPIRE_MINUTES:-60}
      # Ver comentario en el servicio "backend" — misma clave, mismo tenant.
      CREDENTIALS_ENCRYPTION_KEY: ${CREDENTIALS_ENCRYPTION_KEY:-}
      DEBUG: ${DEBUG:-false}
      CORS_ORIGINS: ${CORS_ORIGINS:-[]}
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - agencia-net

volumes:
  postgres-data:
  n8n-data:

networks:
  agencia-net:
    driver: bridge
